- name: Demo on Filters
  hosts: local
  connection: local
  vars:
    topics: "linux, shell, ansible, terraform"
    tagMap:
      name: "ansible"
      project: "roboshop"
      component: "catalogue"
    tagList: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]

  tasks: 
  - name: Greetings
    ansible.builtin.debug:
      msg: "Hi, Vinod {{ greets | default('How Are You?') }}"

  - name: Convert String to List
    ansible.builtin.debug:
      msg: "{{ topics | split(',') | map('trim') | list }}"

  - name: Convert Map to List
    ansible.builtin.debug:
      msg: "{{ tagMap | dict2items }}"

  - name: Convert List to Map
    ansible.builtin.debug:
      msg: "{{ tagList | items2dict }}"