# Variable Preferences
- name: Variable Preferences
  hosts: local
  connection: local
  vars:
    NAME: "Ansible from PLAY"
  vars_files:
  - course.yaml
  vars_prompt:
  - name: NAME
    prompt: Please enter prompt
    private: false
  tasks:
  - name: Print Name
    vars:
      NAME: "Ansible from TASK"
